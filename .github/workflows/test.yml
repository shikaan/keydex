name: test
on:
  push:
    paths-ignore:
      - "**.md"

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-go@v3
        with:
          go-version: 1.25.0
      - run: make test
      - run: make docs
      - name: Verify no stale documentation
        run: git diff --exit-code -- . ':(exclude)**/*.md'
